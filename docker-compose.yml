services:
  meeting-bot:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.development
    # App config (storage provider, uploader, Azure/S3 creds, notifications, etc.)
    # is the source of truth in .env — copy .env.example -> .env. Only the values
    # that must differ inside the compose network are overridden in `environment`.
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Default to the bundled chrome-cdp sidecar so Google Meet joins use a real,
      # signed-in-capable Chrome instead of the bot's in-container Chromium (which
      # Google increasingly blocks). Set GOOGLE_CHROME_CDP_URL= (empty) to fall
      # back to the in-container browser. See README.md (Usage → Join a Google Meet).
      - GOOGLE_CHROME_CDP_URL=${GOOGLE_CHROME_CDP_URL-http://chrome-cdp:9223}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/usr/src/app
      - ./.chrome:/usr/src/app/.chrome
      - ./assets/screenshots:/usr/src/app/assets/screenshots
      - ./debug-videos:/usr/src/app/debug-videos
      - /usr/src/app/node_modules  # Persist node_modules
    command: ["/bin/bash", "./start.sh"]
    depends_on:
      chrome-cdp:
        condition: service_healthy

  # Real Google Chrome + Xvfb exposed over the Chrome DevTools Protocol, used by
  # the Google Meet bot via GOOGLE_CHROME_CDP_URL. Port 9223 is an nginx proxy
  # that rewrites the Host header so Playwright can drive Chrome's DevTools
  # endpoint from another container (Chrome's raw 9222 is loopback-only and
  # rejects cross-container Host headers). Kept on the internal compose network
  # only — never publish the CDP port to the host. See README.md (Usage → Join a Google Meet).
  chrome-cdp:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.chrome-cdp
    shm_size: "1gb"
    expose:
      - "9223"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9223/json/version"]
      interval: 5s
      timeout: 3s
      retries: 20
